<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nave Espacial</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="intro">
      <div class="scene" aria-hidden="true"></div>
      <section class="content" aria-label="Presentacion del juego">
        <h1>Nave Espacial</h1>
        <p>
          Pilota tu nave, esquiva disparos enemigos y suma puntos destruyendo
          la mayor cantidad de invasores posible.
        </p>
        <ul class="facts">
          <li>Flechas o A/D para moverte</li>
          <li>Espacio para disparar</li>
          <li>R para reiniciar</li>
        </ul>
        <div class="actions">
          <button id="play-button" type="button">Jugar ahora</button>
          <p class="hint">La primera carga puede tardar unos segundos.</p>
        </div>
        <p class="loading">Cargando el juego...</p>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
